<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <title>Погнали?
    </title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="preload" href="#" type="font/woff2" as="font">
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/index.js" defer="defer"></script>
  </head>
  <body class="page__body">
    <header class="header">
      <div class="section__container">
        <div class="header__wrapper">
          <div class="header__brand">
                <svg class="header__logo header__logo--mobile" width="96" height="15" aria-hidden="true" role="img">
                  <use href="icons/stack.svg#logo-mobile"></use>
                </svg>
                <svg class="header__logo header__logo--desktop" width="200" height="50" aria-hidden="true" role="img">
                  <use href="icons/stack.svg#logo-desktop"></use>
                </svg>
          </div>
          <nav class="nav">
            <div class="section__container">
              <div class="nav__wrapper">
                          <svg class="nav__menu-button nav__menu-button--open-icon" width="25" height="11" aria-hidden="true" role="img">
                            <use href="icons/stack.svg#menu-button-open"></use>
                          </svg>
                <div class="nav__open-header">
                            <svg class="nav__open-logo" width="96" height="15" aria-hidden="true" role="img">
                              <use href="icons/stack.svg#logo-mobile"></use>
                            </svg>
                            <svg class="nav__menu-button nav__menu-button--close-icon" width="19" height="20" aria-hidden="true" role="img">
                              <use href="icons/stack.svg#menu-button-close"></use>
                            </svg>
                </div>
                <ul class="nav__list list-reset">
                  <li class="nav__item"><a class="nav__link link-reset" href="#">О сервисе</a></li>
                  <li class="nav__item"><a class="nav__link link-reset" href="#">Направления</a></li>
                  <li class="nav__item"><a class="nav__link link-reset" href="#">Попутчики</a></li>
                </ul>
                <div class="nav__contacts">
                  <div class="contacts contacts--mobile contacts--desktop">
                    <div class="contacts__item"><a class="contacts__link link-reset" href="tel:" aria-label="Позвонить">
                                          <svg class="contacts__icon contacts__icon--phone" width="18" height="18" aria-hidden="true" role="img">
                                            <use href="icons/stack.svg#phone-mobile-icon"></use>
                                          </svg></a><span class="contacts__text">8 800 555-86-28</span></div>
                    <div class="contacts__item"><a class="contacts__link link-reset" href="mailto:" aria-label="Написать на почту">
                                          <svg class="contacts__icon contacts__icon--email" width="16" height="14" aria-hidden="true" role="img">
                                            <use href="icons/stack.svg#email-icon"></use>
                                          </svg></a><span class="contacts__text">mail@htmlacademy.ru</span></div>
                  </div>
                  <div class="social">
                    <div class="social__wrapper">
                      <ul class="social__list list-reset">
                        <li class="social__item"><a class="social__link link-reset" href="#" aria-label="Telegram">
                                              <svg class="social__icon" width="24" height="24" aria-hidden="true" role="img">
                                                <use href="icons/stack.svg#telegram"></use>
                                              </svg></a></li>
                        <li class="social__item"><a class="social__link link-reset" href="#" aria-label="ВКонтакте">
                                              <svg class="social__icon" width="30" height="24" aria-hidden="true" role="img">
                                                <use href="icons/stack.svg#vk"></use>
                                              </svg></a></li>
                        <li class="social__item"><a class="social__link link-reset" href="#" aria-label="YouTube">
                                              <svg class="social__icon" width="24" height="24" aria-hidden="true" role="img">
                                                <use href="icons/stack.svg#youtube"></use>
                                              </svg></a></li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </nav>
          <div class="contacts contacts--mobile contacts--desktop">
            <div class="contacts__item"><a class="contacts__link link-reset" href="tel:" aria-label="Позвонить">
                          <svg class="contacts__icon contacts__icon--phone" width="18" height="18" aria-hidden="true" role="img">
                            <use href="icons/stack.svg#phone-icon"></use>
                          </svg></a><span class="contacts__text">8 800 555-86-28</span></div>
            <div class="contacts__item"><a class="contacts__link link-reset" href="mailto:" aria-label="Написать на почту">
                          <svg class="contacts__icon contacts__icon--email" width="16" height="14" aria-hidden="true" role="img">
                            <use href="icons/stack.svg#email-icon"></use>
                          </svg></a><span class="contacts__text">mail@htmlacademy.ru</span></div>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="section__container">
          <div class="hero__wrapper"> 
            <h1 class="hero__title title"></h1>
            <div class="instructions">
              <ul class="instructions__cards list-reset">
                <li class="instructions__card">
                  <p class="instructions__text">Выберети направление</p><span class="instructions__counter">1</span>
                </li>
                <li class="instructions__card">
                  <p class="instructions__text">Изучите идеи путешественников</p><span class="instructions__counter">2</span>
                </li>
                <li class="instructions__card">
                  <p class="instructions__text">Находите тех, кто похож на вас</p><span class="instructions__counter">3</span>
                </li>
                <li class="instructions__card">
                  <p class="instructions__text">Путешествуйте вместе!</p><span class="instructions__counter">4</span>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </section>
      <section class="block"> 
        <div class="section__container">
          <div class="block__wrapper"> 
            <h2 class="block__title title"> </h2>
            <p class="block__text text"></p><a class="block__link link"></a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
